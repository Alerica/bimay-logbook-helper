<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Logbook Helper</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>

    <h2>BINUSMAYA Logbook Helper</h2>

    <div id="rows">
        <div class="loading">Loading records...</div>
    </div>

    <div class="separator"></div>

    <h3>Template Settings</h3>

    <div class="form-group-row">
        <div class="form-group">
            <label for="clockIn">Clock In</label>
            <input id="clockIn" value="07:30 AM">
        </div>
        <div class="form-group">
            <label for="clockOut">Clock Out</label>
            <input id="clockOut" value="04:30 PM">
        </div>
    </div>

    <div class="form-group">
        <label for="activity">Activity</label>
        <input id="activity" value="Project 1">
    </div>

    <div class="form-group">
        <label for="description">Description</label>
        <textarea id="description" rows="4"></textarea>
    </div>

    <button id="run">Run</button>

    <div class="author"> <h4>Thank you for using, check Github/Alerica</h4> </div>
    
    <script src="popup.js"></script>
</body>
</html>
